services:
  - type: web
    name: preptracker
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: preptracker-db
          property: connectionString

databases:
  - name: preptracker-db
    plan: free
